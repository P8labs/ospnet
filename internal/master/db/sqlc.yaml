version: "2"

sql:
  - engine: "sqlite"
    schema: "migrations"
    queries: "queries"
    gen:
      go:
        package: "db"
        out: "."
        emit_json_tags: true
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"